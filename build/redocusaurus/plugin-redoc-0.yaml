tags:
  - name: Authentication
    description: >-
      # Chaves de API (API Keys)


      As Chaves de API são segredos únicos gerados para cada empresa (seja um
      Terminal ou uma Transportadora) para permitir a autenticação de sistemas
      externos (B2B) nas APIs do GateIn.


      ---


      ## Como as Chaves de API Funcionam?


      Qualquer requisição feita aos endpoints da API (ex: cadastrar agendamentos
      ou viagens) precisa incluir a chave de API no cabeçalho HTTP:


      * **Header:** `X-API-Key`

      * **Formato:** Inicia sempre com o prefixo `sk_live_` (exemplo:
      `sk_live_prod_abc123xyz_key`).

      * **Segurança:** A chave de API dá acesso total de escrita/leitura para as
      operações da sua empresa. Trate-a como uma senha: nunca insira a chave em
      códigos que rodam no navegador do cliente (frontend) nem faça commit dela
      em repositórios públicos.


      ---


      ## Como Gerar ou Rotacionar uma Chave de API no Website?


      Para obter a sua credencial ou rotacionar a chave existente, siga o passo
      a passo no painel do GateIn:


      1. **Acesse o Sistema:** Faça login na plataforma web do GateIn com sua
      conta de administrador.

      2. **Navegue até Configurações:** No menu lateral esquerdo, clique em
      **Configurações**.

      3. **Selecione a aba Integrações:** Clique na aba ou seção de **Chaves de
      API** / **Integrações**.

      4. **Gerar/Rotacionar Chave:** Clique no botão **Gerar Chave** ou
      **Rotacionar Chave**. *Nota: Cada empresa possui apenas uma única chave de
      API ativa por vez. Ao gerar uma nova chave, a anterior é automaticamente
      revogada e invalidada.*

      5. **Copie o Segredo:** A chave será gerada e exibida na tela.
      **Atenção:** Por motivos de segurança, essa chave só é mostrada uma única
      vez. Salve-a em um gerenciador de segredos ou cofre seguro antes de fechar
      a janela.


      ---


      ## Validando sua Chave via API


      Para testar a integração e garantir que sua chave está ativa e configurada
      corretamente, envie uma requisição para o endpoint `/validate-api-key`:


      #### Exemplo em cURL:

      ```bash

      curl -X GET "https://api.gatein.com/api/v1/validate-api-key" \
        -H "X-API-Key: sk_live_exemplo_suachavesecreta"
      ```


      #### Exemplo em Python:

      ```python

      import requests


      url = "https://api.gatein.com/api/v1/validate-api-key"

      headers = {
          "X-API-Key": "sk_live_exemplo_suachavesecreta"
      }


      response = requests.get(url, headers=headers)

      print(response.json())

      ```


      #### Exemplo em JavaScript (Node/Fetch):

      ```javascript

      fetch('https://api.gatein.com/api/v1/validate-api-key', {
        method: 'GET',
        headers: {
          'X-API-Key': 'sk_live_exemplo_suachavesecreta'
        }
      })

      .then(res => res.json())

      .then(data => console.log(data))

      .catch(err => console.error(err));

      ```


      ---


      # Autenticação via API Key


      Para autenticar suas requisições, inclua a sua chave de API no header
      `X-API-Key` de todas as chamadas.


      ## Headers Obrigatórios


      | Header | Formato | Exemplo |

      | :--- | :--- | :--- |

      | `X-API-Key` | Começa com `sk_live_` | `sk_live_prod_abc123xyz` |


      ## Resposta do endpoint `/validate-api-key`


      | Campo | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `success` | `boolean` | `true` em caso de sucesso |

      | `data.type` | `string` | Tipo da empresa: `terminal` ou `trucking` |

      | `data.username` | `string` | Username da empresa no GateIn |

      | `data.name` | `string` | Razão social da empresa |

      | `data.tax_id` | `string` | CNPJ da empresa |


      ## Erros


      | HTTP | `code` | Causa |

      | :--- | :--- | :--- |

      | `401` | `INVALID_API_KEY_FORMAT` | Chave sem prefixo `sk_live_` ou
      malformada |
  - name: Appointments
    description: >-
      # Gestão de Agendamentos (Appointments)


      O módulo de agendamentos foi feito sob medida para **Terminais logísticos
      e Portuários** gerenciarem o fluxo planejado de entradas e saídas de
      motoristas e veículos. Todas as operações são feitas em lote (batch) para
      otimizar a performance da rede e o processamento de dados.


      ---


      ## Schemas


      ### Driver


      > [!NOTE]

      > Os campos marcados com `*` são obrigatórios.


      | Campo | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `*tax_id` | `string` | CPF ou CNPJ do motorista (apenas números, sem
      pontos ou traço) |

      | `*driver_license_number` | `string` | Número da CNH |

      | `*license_category` | `string` | Categoria de habilitação (ex: `C`, `D`,
      `E`) |



      ### Appointment


      | Campo | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `*ref` | `string` | Chave única no seu sistema de origem (ex: ID da
      Ordem de Carga). Usada para buscar, alterar ou remover o registro |

      | `*layout_ref` | `string` | ID do layout dinâmico a aplicar a este
      agendamento |

      | `schedule_start_time` | `string` ISO-8601 | Horário inicial agendado
      (ex: `2026-07-15T08:00:00Z`) |

      | `schedule_end_time` | `string` ISO-8601 | Horário limite final agendado
      (ex: `2026-07-15T12:00:00Z`) |

      | `schedule_start_tolerance` | `integer` | Margem de tolerância em minutos
      antes do início (default: `0`) |

      | `schedule_end_tolerance` | `integer` | Margem de tolerância em minutos
      após o término (default: `0`) |

      | `vehicle_plate` | `string` | Placa do cavalo mecânico ou veículo
      principal |

      | `summary` | `string` | Observações ou notas textuais sobre a operação |

      | `custom_data` | `object` | Campos adicionais chave-valor para
      armazenamento livre |



      ### Customização Dinâmica de Layout (`layout_ref`)


      A propriedade `layout_ref` vincula o agendamento a um modelo de layout
      dinâmico cadastrado, ditando como o GateIn App e o painel web renderizam o
      agendamento e o **Ticket digital de acesso** do motorista.


      #### Elementos do Card / Modal (`card_layout` / `modal_layout`)


      | Elemento | Descrição |

      | :--- | :--- |

      | `section` | Título de seção agrupador |

      | `field` | Linha com rótulo + valor extraído dinamicamente (ex:
      `driver.name`) |

      | `alert` | Bloco de destaque com cores (`purple`, `blue`, `green`,
      `yellow`, `red`, `gray`) e ícones |

      | `qrcode` | Código QR renderizado a partir de uma chave de dados |


      #### Elementos do Ticket Digital (`TicketLayout`)


      | Elemento | Descrição |

      | :--- | :--- |

      | `divider` | Linha separadora horizontal |

      | `field` | Linha chave-valor (rótulo em cinza, valor em negrito) |

      | `section` | Divisor com título de agrupamento em caixa alta |

      | `tag_container` | Grupo de etiquetas coloridas arredondadas |

      | `attention` | Caixa de alerta com borda e ícone (ex: uso de EPI) |

      | `instruction` | Lista ordenada com bullets numerados para o fluxo do
      motorista |

      | `text` | Parágrafo de texto livre (avisos, regras, informações legais) |

      | `highlight` / `highlight_grid` | Dado em destaque com fonte grande (ex:
      número da baia, peso na balança) |



      ---


      ## Criar Agendamento(s) (POST)


      **Endpoint:** `POST /api/v1/appointments` — **`201 Created`**


      > [!NOTE]

      > Este endpoint aceita tanto um **único objeto** quanto uma **lista
      (array) de objetos** para criação em lote.


      ### Regras de Negócio


      > **Importante:**

      > * **Fail-Fast (Chaves Duplicadas):** Se algum `ref` já existir, toda a
      transação sofre rollback (`409 Conflict`).

      > * **Fail-Fast (Layout Inválido):** `layout_ref` inexistente retorna `400
      Bad Request`.

      > * **Criação Inteligente de Motoristas:** Se o `tax_id` não existir, o
      motorista é criado automaticamente. Se já existir, os dados da CNH são
      atualizados.


      ### Payload de Exemplo

      ```json

      [
        {
          "driver": {
            "tax_id": "12345678909",
            "driver_license_number": "9876543210",
            "license_category": "E"
          },
          "appointment": {
            "ref": "AG-2026-009",
            "layout_ref": "layout-graos-v1",
            "schedule_start_time": "2026-07-15T14:00:00Z",
            "schedule_end_time": "2026-07-15T16:00:00Z",
            "schedule_start_tolerance": 30,
            "schedule_end_tolerance": 60,
            "summary": "Descarregamento de Soja Orgânica",
            "vehicle_plate": "ABC1D23",
            "custom_data": {
              "nota_fiscal": "45982",
              "peso_estimado_kg": 42000
            }
          }
        }
      ]

      ```


      ### Exemplos de Código


      #### cURL

      ```bash

      curl -X POST "https://api.gatein.com/api/v1/appointments" \
        -H "X-API-Key: sk_live_suachave" \
        -H "Content-Type: application/json" \
        -d '[{"driver":{"tax_id":"12345678909","driver_license_number":"9876543210","license_category":"E"},"appointment":{"ref":"AG-2026-009","layout_ref":"layout-graos-v1"}}]'
      ```


      #### Python

      ```python

      import requests


      url = "https://api.gatein.com/api/v1/appointments"

      headers = {"X-API-Key": "sk_live_suachave", "Content-Type":
      "application/json"}

      payload = [
          {
              "driver": {"tax_id": "12345678909", "driver_license_number": "9876543210", "license_category": "E"},
              "appointment": {
                  "ref": "AG-2026-009",
                  "layout_ref": "layout-graos-v1",
                  "schedule_start_time": "2026-07-15T14:00:00Z",
                  "schedule_end_time": "2026-07-15T16:00:00Z",
                  "vehicle_plate": "ABC1D23"
              }
          }
      ]


      response = requests.post(url, headers=headers, json=payload)

      print(response.json())

      ```


      ---


      ## Atualizar Agendamento(s) (PUT)


      **Endpoint:** `PUT /api/v1/appointments`


      > [!NOTE]

      > Este endpoint aceita tanto um **único objeto** de atualização quanto uma
      **lista (array) de objetos** para atualização em lote.


      ### Campos Protegidos (não editáveis)


      | Campo | Motivo |

      | :--- | :--- |

      | `id` | Chave primária interna |

      | `terminal_id` | Vínculo de propriedade imutável |

      | `ref` | Chave de referência externa — usada como identificador |

      | `user_tax_id` | Identidade do motorista vinculado |



      ### Payload de Exemplo

      ```json

      [
        {
          "ref": "AG-2026-009",
          "appointment": {
            "vehicle_plate": "XYZ9Z99",
            "summary": "Placa de cavalo mecânico atualizada por mudança de frota."
          }
        }
      ]

      ```


      ---


      ## Cancelar / Deletar Agendamento(s) (DELETE)


      **Endpoint:** `DELETE /api/v1/appointments`


      > [!NOTE]

      > Este endpoint aceita tanto uma **única string** de referência quanto um
      **array de strings** para cancelamento em lote.


      Altera o status do agendamento para `DELETED` e insere logs de auditoria.
      Exemplo de envio em lote:


      ```json

      ["AG-2026-009", "AG-2026-010"]

      ```


      ---


      ## Consultar Logs e Histórico (GET)


      **Endpoint:** `GET /api/v1/appointments/logs`


      ### Query Parameters


      | Parâmetro | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `refs` | `string[]` | Repita o parâmetro para múltiplos valores:
      `?refs=AG-2026-009&refs=AG-2026-010` |



      ### Resposta de Exemplo

      ```json

      {
        "success": true,
        "data": [
          {
            "ref": "AG-2026-009",
            "found": true,
            "data": {
              "appointment": {
                "id": "c1f72782-b7e1-4560-84c4-f2a8c17df20b",
                "terminal_id": "e3a817a9-17d2-4e92-bc91-2a1c8f1e56ab",
                "ref": "AG-2026-009",
                "layout_ref": "3",
                "user_tax_id": "12345678909",
                "status": "DELETED",
                "summary": "Agendamento cancelado",
                "vehicle_plate": "XYZ9Z99",
                "schedule_start_time": "2026-07-12T10:00:00Z",
                "schedule_end_time": "2026-07-12T12:00:00Z",
                "schedule_start_tolerance": 30,
                "schedule_end_tolerance": 30,
                "custom_data": {
                  "ticket_acesso": "TC-90182"
                },
                "created_at": "2026-07-12T09:00:00Z",
                "updated_at": "2026-07-12T10:15:00Z"
              },
              "driver": {
                "tax_id": "12345678909",
                "driver_license_number": "902817265",
                "driver_license_category": "D"
              },
              "logs": [
                { "event": "deleted", "message": "Agendamento deletado/cancelado.", "created_at": "2026-07-12T10:15:00.000000" },
                { "event": "created", "message": "Agendamento criado via API.", "created_at": "2026-07-12T09:00:00.000000" }
              ]
            }
          }
        ]
      }

      ```


      ---


      ## Erros Comuns


      | HTTP | code | Causa |

      | :--- | :--- | :--- |

      | `400` | `EMPTY_PAYLOAD` | Array vazio enviado no body |

      | `400` | `INVALID_LAYOUT_REF` | `layout_ref` não existe para este
      terminal |

      | `409` | `DUPLICATE_KEY` | Um ou mais `ref`s já existem no banco |

      | `404` | `REFS_NOT_FOUND` | `ref`s informados no PUT/DELETE não foram
      encontrados |
  - name: Trips
    description: >-
      # Gestão de Viagens (Trips)


      O módulo de viagens foi projetado para **Transportadoras, Embarcadores e
      Operadores de Frota** registrarem e rastrearem a locomoção de cargas entre
      pontos de coleta (origem) e entrega (destino). As requisições são
      processadas em lote (batch) para alta performance.


      ---


      ## Schemas


      ### Driver


      > [!NOTE]

      > Os campos marcados com `*` são obrigatórios.


      | Campo | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `*tax_id` | `string` | CPF ou CNPJ do motorista (apenas números) |

      | `*driver_license_number` | `string` | Número da CNH |

      | `*license_category` | `string` | Categoria de habilitação (ex: `C`, `D`,
      `E`) |


      ### Trip


      | Campo | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `*ref` | `string` | Referência única da viagem no seu TMS/ERP (ex:
      número do MDF-e ou CT-e). Usada em todas as consultas e atualizações |

      | `*layout_ref` | `string` | Código do layout dinâmico associado |

      | `vehicle_plate` | `string` | Placa do caminhão/carreta |

      | `summary` | `string` | Observações ou detalhes adicionais da rota |

      | `start_time` | `string` ISO-8601 | Início previsto da viagem |

      | `end_time` | `string` ISO-8601 | Término previsto |

      | `schedule_start_tolerance` | `integer` | Margem de tolerância em minutos
      antes do início (default: `0`) |

      | `schedule_end_tolerance` | `integer` | Margem de tolerância em minutos
      após o término (default: `0`) |

      | `custom_data` | `object` | Metadados dinâmicos estruturados da viagem |


      ### Dados Geográficos de Origem


      | Campo | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `from_location` | `string` | Descrição textual da origem (ex: `Fábrica
      de Cimento Votorantim`) |

      | `origin_street` | `string` | Nome da rua/avenida |

      | `origin_number` | `string` | Número predial |

      | `origin_city` | `string` | Cidade |

      | `origin_state` | `string` | Estado (sigla com 2 caracteres, ex: `SP`) |

      | `origin_country` | `string` | País |

      | `origin_zip` | `string` | CEP (apenas números) |

      | `origin_lat` | `float` | Latitude para geofencing (ex: `-20.1219`) |

      | `origin_lng` | `float` | Longitude para geofencing (ex: `-44.1997`) |


      ### Dados Geográficos de Destino


      | Campo | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `to_location` | `string` | Descrição textual do destino (ex: `Centro de
      Distribuição Cajamar`) |

      | `destiny_street` | `string` | Nome da rua/avenida |

      | `destiny_number` | `string` | Número predial |

      | `destiny_city` | `string` | Cidade |

      | `destiny_state` | `string` | Estado (sigla com 2 caracteres) |

      | `destiny_country` | `string` | País |

      | `destiny_zip` | `string` | CEP (apenas números) |

      | `destiny_lat` | `float` | Latitude do destino |

      | `destiny_lng` | `float` | Longitude do destino |


      ---


      ## Criar Viagem(ns) (POST)


      **Endpoint:** `POST /api/v1/trips` — **`201 Created`**


      > [!NOTE]

      > Este endpoint aceita tanto um **único objeto** quanto uma **lista
      (array) de objetos** para criação em lote.


      ### Regras de Negócio


      > **Importante:**

      > * **Fail-Fast (Chaves Duplicadas):** Se algum `ref` já existir associado
      à sua empresa, toda a transação falha (`409 Conflict`).

      > * **Fail-Fast (Layout Inválido):** Referências de layout inexistentes
      retornam `400 Bad Request`.


      ### Payload de Exemplo

      ```json

      [
        {
          "driver": {
            "tax_id": "98765432109",
            "driver_license_number": "1234567890",
            "license_category": "D"
          },
          "trip": {
            "ref": "TR-MDFE-4819",
            "layout_ref": "layout-mineracao-v2",
            "vehicle_plate": "BRA2E19",
            "start_time": "2026-07-16T06:00:00Z",
            "end_time": "2026-07-16T18:00:00Z",
            "schedule_start_tolerance": 30,
            "schedule_end_tolerance": 60,
            "from_location": "Sede Mineradora Brumadinho",
            "origin_city": "Brumadinho",
            "origin_state": "MG",
            "origin_lat": -20.1219,
            "origin_lng": -44.1997,
            "to_location": "Porto de Tubarão",
            "destiny_city": "Vitória",
            "destiny_state": "ES",
            "destiny_lat": -20.2878,
            "destiny_lng": -40.2882,
            "summary": "Transporte de Minério de Ferro bruto.",
            "custom_data": {
              "mdf_key": "31260712345678901234580010000048191000048198"
            }
          }
        }
      ]

      ```


      ### Exemplos de Código


      #### cURL

      ```bash

      curl -X POST "https://api.gatein.com/api/v1/trips" \
        -H "X-API-Key: sk_live_suachave" \
        -H "Content-Type: application/json" \
        -d '[{"driver":{"tax_id":"98765432109","driver_license_number":"1234567890","license_category":"D"},"trip":{"ref":"TR-MDFE-4819","layout_ref":"layout-mineracao-v2","vehicle_plate":"BRA2E19"}}]'
      ```


      #### Python

      ```python

      import requests


      url = "https://api.gatein.com/api/v1/trips"

      headers = {"X-API-Key": "sk_live_suachave", "Content-Type":
      "application/json"}

      payload = [
          {
              "driver": {"tax_id": "98765432109", "driver_license_number": "1234567890", "license_category": "D"},
              "trip": {
                  "ref": "TR-MDFE-4819",
                  "layout_ref": "layout-mineracao-v2",
                  "vehicle_plate": "BRA2E19",
                  "from_location": "Filial SP",
                  "to_location": "Porto Santos"
              }
          }
      ]


      response = requests.post(url, headers=headers, json=payload)

      print(response.json())

      ```


      ---


      ## Atualizar Viagem(ns) (PUT)


      **Endpoint:** `PUT /api/v1/trips`


      > [!NOTE]

      > Este endpoint aceita tanto um **único objeto** de atualização quanto uma
      **lista (array) de objetos** para atualização em lote.


      ### Campos Protegidos (não editáveis)


      | Campo | Motivo |

      | :--- | :--- |

      | `id` | Chave primária interna |

      | `trucking_company_id` | Vínculo de propriedade imutável |

      | `ref` | Chave de referência externa — usada como identificador |

      | `driver_id` | Identidade do motorista vinculado |



      ### Payload de Exemplo

      ```json

      [
        {
          "ref": "TR-MDFE-4819",
          "trip": {
            "vehicle_plate": "NEW3A21",
            "summary": "Placa de cavalo mecânico substituída por pane mecânica."
          }
        }
      ]

      ```


      ---


      ## Cancelar / Deletar Viagem(ns) (DELETE)


      **Endpoint:** `DELETE /api/v1/trips`


      > [!NOTE]

      > Este endpoint aceita tanto uma **única string** de referência quanto um
      **array de strings** para cancelamento em lote.


      Altera o status da viagem para `DELETED`. Exemplo de envio em lote:


      ```json

      ["TR-MDFE-4819"]

      ```


      ---


      ## Consultar Logs e Histórico de Rastreamento (GET)


      **Endpoint:** `GET /api/v1/trips/logs`


      ### Query Parameters


      | Parâmetro | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `refs` | `string[]` | Repita o parâmetro para múltiplos valores:
      `?refs=TR-MDFE-4819&refs=TR-MDFE-4820` |



      ### Resposta de Exemplo

      ```json

      {
        "success": true,
        "data": [
          {
            "ref": "TR-MDFE-4819",
            "found": true,
            "data": {
              "trip": {
                "id": "f5e92716-11f8-4cb3-a5c6-c9a7d36d8f1e",
                "trucking_company_id": "b3e9281a-12f8-4cb3-a5c6-d9a7e36d8f92",
                "ref": "TR-MDFE-4819",
                "layout_ref": "layout-mineracao-v2",
                "driver_id": "d1d82761-b7e1-4560-84c4-f2a8c17df20b",
                "vehicle_plate": "NEW3A21",
                "status": "CREATED",
                "summary": "Transporte de minério de ferro",
                "schedule_start_time": "2026-07-16T06:00:00Z",
                "schedule_end_time": "2026-07-16T18:00:00Z",
                "schedule_start_tolerance": 30,
                "schedule_end_tolerance": 60,
                "custom_data": {},
                "origin_street": "Avenida Mineral",
                "origin_number": "1000",
                "origin_city": "Brumadinho",
                "origin_state": "MG",
                "origin_country": "BR",
                "origin_zip": "35460000",
                "origin_lat": -20.1219,
                "origin_lng": -44.1997,
                "destiny_street": "Avenida Portuária",
                "destiny_number": "S/N",
                "destiny_city": "Vitória",
                "destiny_state": "ES",
                "destiny_country": "BR",
                "destiny_zip": "29000000",
                "destiny_lat": -20.3184,
                "destiny_lng": -40.2925,
                "from_location": "Sede Mineradora Brumadinho",
                "to_location": "Porto de Tubarão",
                "created_at": "2026-07-12T12:10:00Z",
                "updated_at": "2026-07-12T12:18:14Z"
              },
              "driver": {
                "tax_id": "98765432109",
                "driver_license_number": "1234567890",
                "driver_license_category": "D"
              },
              "logs": [
                { "event": "updated", "message": "Viagem atualizada via API.", "created_at": "2026-07-12T12:18:14.000000" },
                { "event": "created", "message": "Viagem criada via API.", "created_at": "2026-07-12T12:10:00.000000" }
              ]
            }
          }
        ]
      }

      ```


      ---


      ## Erros Comuns


      | HTTP | code | Causa |

      | :--- | :--- | :--- |

      | `400` | `EMPTY_PAYLOAD` | Array vazio enviado no body |

      | `400` | `INVALID_LAYOUT_REF` | `layout_ref` não existe para esta
      transportadora |

      | `409` | `DUPLICATE_KEY` | Um ou mais `ref`s já existem no banco |

      | `404` | `REFS_NOT_FOUND` | `ref`s informados no PUT/DELETE não foram
      encontrados |
  - name: Services
    description: >-
      # Autenticação de Serviços da Empresa (Services Auth)


      Quando um usuário acessa um **serviço externo cadastrado por uma empresa
      parceira** (ex: portal de agendamento, rastreamento de carga ou
      benefícios), o aplicativo GateIn Mobile autentica o usuário
      automaticamente através de um handshake seguro baseado em JWT.


      ---


      ## Como Funciona o Handshake?


      1. O usuário clica em um serviço da empresa no app GateIn Mobile.

      2. O app obtém um token JWT de curta duração junto ao servidor GateIn.

      3. O app abre uma WebView para a URL do serviço e **injeta o token via
      JavaScript** no `localStorage` da página antes de ela ser renderizada.

      4. O JavaScript da página lê o token do `localStorage` e chama o endpoint
      `/services/validate-user-token` para validar o usuário.

      5. O servidor GateIn retorna os dados do usuário e o site libera o acesso.


      ---


      ## Como o Token é Injetado


      O GateIn Mobile usa `injectedJavaScript` da WebView para gravar o token no
      `localStorage` da página do serviço **antes** de qualquer código da página
      executar:


      ```javascript

      // Código executado pela WebView do GateIn Mobile ao abrir o serviço

      (function() {
          window.localStorage.setItem('auth_token', '<jwt_token>');
      })();

      ```


      O site da empresa deve ler essa chave ao inicializar:


      ```javascript

      const authToken = window.localStorage.getItem('auth_token');

      if (authToken) {
          validateGateInUser(authToken);
      }

      ```


      ---


      ## Validando o Token


      Após ler o `auth_token` do `localStorage`, faça uma requisição autenticada
      com sua API Key:


      ### Headers da Requisição


      > [!NOTE]

      > Os campos marcados com `*` são obrigatórios.


      | Header | Descrição |

      | :--- | :--- |

      | `*X-API-Key` | Chave de API da sua empresa (`sk_live_...`) |

      | `*Auth-Token` | O JWT lido do `localStorage.auth_token` |


      ### Campos da Resposta (`data`)


      > [!NOTE]

      > Os campos marcados com `*` são obrigatórios.


      | Campo | Tipo | Descrição |

      | :--- | :--- | :--- |

      | `*tax_id` | `string` | CPF ou CNPJ do usuário |

      | `name` | `string | null` | Nome completo do usuário |

      | `phone` | `string | null` | Telefone com DDD |

      | `email` | `string | null` | E-mail cadastrado (pode ser nulo) |


      ---


      ## Segurança


      | Aspecto | Detalhe |

      | :--- | :--- |

      | Algoritmo JWT | HS256, assinado com a chave secreta do GateIn |

      | Expiração | 3 minutos (180 segundos) — valide imediatamente após abrir a
      página |

      | Autenticação | API Key (`X-API-Key`) obrigatória em todas as chamadas |

      | Escopo | O token dá acesso apenas à leitura de dados do usuário |

      | Reutilização | Gere um novo token a cada abertura do serviço |



      ---


      ## Exemplos de Integração


      ### Lendo e validando o token (JavaScript / fetch)


      ```javascript

      async function validateGateInUser(authToken) {
        const response = await fetch(
          'https://api.gatein.com/api/v1/services/validate-user-token',
          {
            method: 'GET',
            headers: {
              'X-API-Key': 'sk_live_suachavesecreta',
              'Auth-Token': authToken
            }
          }
        );

        if (!response.ok) {
          console.error('Token inválido ou expirado');
          return null;
        }

        const { data } = await response.json();
        console.log('Usuário autenticado:', data.name, data.tax_id);
        return data;
      }


      // Ponto de entrada — lê o token injetado pelo GateIn Mobile

      const authToken = window.localStorage.getItem('auth_token');

      if (authToken) {
        validateGateInUser(authToken);
      }

      ```


      ### Validando no backend (Python)


      ```python

      import requests


      def validate_gatein_user(auth_token: str) -> dict | None:
          url = "https://api.gatein.com/api/v1/services/validate-user-token"
          headers = {
              "X-API-Key": "sk_live_suachavesecreta",
              "Auth-Token": auth_token
          }
          response = requests.get(url, headers=headers)
          if response.status_code == 200:
              return response.json()["data"]
          return None
      ```


      ---


      ## Erros Comuns


      | HTTP | Code | Causa |

      | :--- | :--- | :--- |

      | `401` | `EXPIRED_TOKEN` | Token gerado há mais de 3 minutos |

      | `401` | `INVALID_TOKEN` | Token malformado ou assinatura inválida |

      | `401` | `USER_NOT_FOUND` | Usuário referenciado no token não existe mais
      |

      | `401` | `INVALID_API_KEY` | A `X-API-Key` fornecida é inválida |
  - name: Websocket & Checkin
    description: >-
      # Processo de Check-in Remoto via WebSockets (Socket.IO)


      Para permitir a automação na entrada e saída de veículos, o GateIn utiliza
      uma comunicação bidirecional em tempo real entre o servidor backend e os
      **terminais físicos (totens/cancelas)** instalados na portaria. Essa
      comunicação é feita via protocolo WebSockets através do **Socket.IO**.


      ---


      ## Fluxo de Comunicação e Handshake


      O processo de check-in remoto envolve a coordenação entre o aplicativo
      mobile do motorista, a API REST, o servidor de sockets e o equipamento
      físico do terminal.


      ## Passo a Passo do Fluxo de Check-in


      O processo de check-in remoto é composto por seis etapas sequenciais
      coordenadas em tempo real:


      1. **Conexão Persistente (Totem)**: O terminal físico (totem/cancela)
      inicia uma conexão persistente via WebSockets no namespace `/checkin`,
      identificando-se com sua chave de API única. O servidor valida a
      credencial e insere o terminal em uma sala de socket exclusiva
      identificada pelo UUID da empresa.

      2. **Solicitação do Motorista**: Ao se posicionar na entrada do terminal,
      o motorista solicita o check-in remoto pelo aplicativo enviando um `POST
      /api/mobile/checkin/{terminal_id}`.

      3. **Validação de Disponibilidade**: A API REST verifica se o totem está
      registrado no dicionário em memória de conexões ativas
      (`active_terminals`). Se estiver offline, retorna `503 Service
      Unavailable` imediatamente.

      4. **Chamada de Socket (Handshake)**: Caso o totem esteja ativo, o
      servidor REST invoca uma chamada síncrona de socket (`sio.call`) com
      timeout de 10 segundos, enviando o CPF/CNPJ do motorista (`tax_id`) por
      meio do evento `request_checkin`.

      5. **Ação Física no Equipamento**: O totem físico recebe o evento, realiza
      o processamento local (conferência física, pesagem ou impressão térmica de
      vias) e devolve a lista de tickets gerados no retorno do handshake (Socket
      ACK).

      6. **Persistência & Confirmação**: O servidor recebe a lista de tickets,
      valida a integridade das referências de layout de impressão contra o banco
      de dados, marca o agendamento associado como `CHECKED_IN`, grava os
      tickets no banco de dados e retorna a lista de tickets gerados para o
      aplicativo móvel (`200 OK`).


      ---


      ## 1. Conexão do Equipamento (Totem/Terminal)


      O equipamento na ponta deve manter uma conexão de socket persistente com o
      servidor GateIn.


      ### Parâmetros de Conexão

      * **URL**: `http://<domain>/checkin`

      * **Namespace**: `/checkin`

      * **Autenticação**: É obrigatório fornecer uma chave de API (`api_key`)
      ativa.


      Você pode passar a chave de autenticação de duas maneiras:

      1. **Auth Payload (Recomendado)**: Passar um dicionário contendo a chave
      `api_key`.

      2. **Query Parameters**: Passar como parâmetro de URL
      (`?api_key=sk_live_...`).


      ### Exemplo de Conexão (Python client)

      ```python

      import socketio


      sio = socketio.Client()


      sio.connect(
          'https://api.gatein.com',
          namespaces=['/checkin'],
          auth={'api_key': 'sk_live_suachavesecreta'}
      )

      ```


      ---


      ## 2. Eventos do Socket


      ### Evento Recebido pelo Terminal: `request_checkin`

      Quando um motorista clica para fazer check-in próximo ao totem, o servidor
      envia o evento `request_checkin` para a sala específica do terminal. O
      terminal deve escutar este evento e retornar a resposta contendo as
      informações geradas (como um callback/ack).


      #### Payload Recebido pelo Terminal

      ```json

      {
        "tax_id": "12345678909"
      }

      ```


      #### Resposta Esperada do Terminal (Acknowledgement)

      O terminal deve devolver um array de objetos JSON que detalha as ações e
      os tickets gerados. Caso ocorra erro físico (como falta de papel ou falha
      de impressora), o totem não deve completar o handshake ou responder com
      erro.


      ```json

      [
        {
          "appointment_ref": "AG-2026-002",
          "ticket": {
            "layout_ref": "3",
            "content": {
              "placa": "ABC-1234",
              "status": "CHECKED_IN",
              "armador": "Maersk Line",
              "booking": "BKG-99281726",
              "motorista": "Carlos de Oliveira Souza",
              "created_at": "2026-06-25T14:30:00Z",
              "area_coleta": "Quadra C",
              "placa_carreta": "XYZ-9876",
              "tipo_operacao": "CARREGAMENTO_SOJA"
            }
          }
        }
      ]

      ```


      ---


      ## 3. Tratamento de Erros no Fluxo


      Durante o ciclo de check-in, podem ocorrer erros nos seguintes pontos:


      | Erro | Status HTTP | Causa |

      | :--- | :--- | :--- |

      | Terminal Offline | `503 Service Unavailable` | O ID do terminal não
      possui conexão ativa registrada na memória do servidor. |

      | Tempo Excedido (Timeout) | `504 Gateway Timeout` | O terminal demorou
      mais de 10 segundos para responder ao evento `request_checkin`. |

      | Falha de Comunicação | `500 Internal Server Error` | Erros na camada do
      socket ou interrupção repentina da rede do totem. |

      | Formato Inválido | `502 Bad Gateway` | O terminal respondeu ao ACK mas
      com um payload que não seja uma lista de tickets válida. |

      | Falha de Integridade | `502 Bad Gateway` | O terminal retornou
      referências de layout (`layout_ref`) que não existem cadastradas no banco
      para aquele terminal. |
