openapi: 3.1.0
info:
  title: GateIn External API
  version: 1.0.0
  description: >-
    # Getting Started


    Bem-vindo à documentação oficial da **API de Integração Externa do
    GateIn**. 


    Esta API foi desenvolvida para permitir que parceiros, transportadoras e
    terminais integrem seus sistemas de forma nativa com a plataforma GateIn.
    Através deste canal, você pode automatizar fluxos de agendamentos, viagens e
    validações cadastrais em tempo real.


    ---


    ## O que você pode fazer?


    Esta API expõe endpoints projetados especificamente para cenários de
    integração de sistemas B2B:


    1. **Gestão de Agendamentos (Appointments):** Ideal para **Terminais**
    controlarem janelas horárias, placas de veículos, dados cadastrais de
    motoristas e acompanharem logs detalhados de execução.

    2. **Gestão de Viagens (Trips):** Ideal para **Transportadoras** e
    **Embarcadores** informarem a movimentação de frotas, definirem
    origens/destinos, associarem motoristas e realizarem rastreabilidade.

    3. **Validação Cadastral e Autenticação:** Endpoints utilitários para checar
    credenciais de chaves de API e decodificar tokens JWT utilizados em
    dispositivos móveis.


    ---


    ## Estrutura de Retorno Padrão


    Todas as respostas de sucesso da nossa API retornam um envelope JSON
    unificado com a seguinte assinatura:


    ```json title="Exemplo de Resposta (Sucesso)"

    {
      "success": true,
      "data": {
        "id": "apt_123456",
        "status": "scheduled"
      }
    }

    ```
paths:
  /api/mobile/checkin/{terminal_id}:
    post:
      tags:
        - Websocket & Checkin
      summary: Process Remote Check-in
      description: >-
        Initiates check-in sequence with physical terminal hardware via sockets.
        Validates ticket layout integrity and registers checked-in tickets.
      operationId: process_checkin_api_mobile_checkin__terminal_id__post
      security:
        - HTTPBearer: []
      parameters:
        - name: terminal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Terminal Id
        - name: X-Device-ID
          in: header
          required: true
          schema:
            type: string
            title: X-Device-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketItem'
                title: Response Process Checkin Api Mobile Checkin  Terminal Id  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/appointments:
    post:
      tags:
        - Appointments
      summary: Criar Agendamento(s)
      description: >-
        Registra um único agendamento ou uma lista de agendamentos juntamente
        com os perfis dos motoristas associados. Aceita tanto um objeto
        individual quanto um array (lote) de objetos. Realiza validações
        Fail-Fast.
      operationId: create_appointments_api_v1_appointments_post
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/CreateAppointmentPayload'
                - type: array
                  items:
                    $ref: '#/components/schemas/CreateAppointmentPayload'
              title: Payload
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAppointmentsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
        - Appointments
      summary: Atualizar Agendamento(s)
      description: >-
        Atualiza parcialmente detalhes de agendamentos existentes mapeados por
        suas referências externas exclusivas. Aceita tanto um objeto individual
        quanto um array (lote) de objetos. Apenas campos não protegidos podem
        ser atualizados.
      operationId: update_appointments_api_v1_appointments_put
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/UpdateAppointmentPayload'
                - type: array
                  items:
                    $ref: '#/components/schemas/UpdateAppointmentPayload'
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAppointmentsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - Appointments
      summary: Excluir/Cancelar Agendamento(s)
      description: >-
        Marca agendamentos existentes como DELETED (cancelados) no banco de
        dados. Aceita tanto uma única string de referência quanto um array
        (lote) de strings.
      operationId: delete_appointments_api_v1_appointments_delete
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - type: string
                - type: array
                  items:
                    type: string
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAppointmentsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/appointments/logs:
    get:
      tags:
        - Appointments
      summary: Consultar Logs e Detalhes dos Agendamentos
      description: >-
        Consulta logs históricos detalhados de execução e parâmetros de dados de
        agendamentos em lote usando suas referências.
      operationId: get_appointments_logs_api_v1_appointments_logs_get
      parameters:
        - name: refs
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
            description: Lista de referências de agendamentos
            title: Refs
          description: Lista de referências de agendamentos
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentLogsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate-api-key:
    get:
      tags:
        - Authentication
      summary: Validate API Key
      description: >-
        Validates the provided API key and returns information about the owner
        company (type, username, name, tax_id).
      operationId: validate_api_key_endpoint_api_v1_validate_api_key_get
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/app__api__public__auth__APIKeyValidateResponse
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/trips:
    post:
      tags:
        - Trips
      summary: Criar Viagem(ns)
      description: >-
        Registra uma única viagem ou uma lista de viagens juntamente com os
        perfis dos motoristas escalados para realizar o frete. Aceita tanto um
        objeto individual quanto um array (lote) de objetos. Realiza validações
        Fail-Fast.
      operationId: create_trips_api_v1_trips_post
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/CreateTripPayload'
                - type: array
                  items:
                    $ref: '#/components/schemas/CreateTripPayload'
              title: Payload
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTripsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
        - Trips
      summary: Atualizar Viagem(ns)
      description: >-
        Atualiza campos de dados ou horários para viagens existentes mapeadas
        por suas referências. Aceita tanto um objeto individual quanto um array
        (lote) de objetos. Apenas campos não protegidos podem ser atualizados.
      operationId: update_trips_api_v1_trips_put
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/UpdateTripPayload'
                - type: array
                  items:
                    $ref: '#/components/schemas/UpdateTripPayload'
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTripsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - Trips
      summary: Excluir/Cancelar Viagem(ns)
      description: >-
        Marca viagens existentes como DELETED (canceladas) no banco de dados.
        Aceita tanto uma única string de referência quanto um array (lote) de
        strings.
      operationId: delete_trips_api_v1_trips_delete
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - type: string
                - type: array
                  items:
                    type: string
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteTripsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/trips/logs:
    get:
      tags:
        - Trips
      summary: Consultar Logs e Detalhes de Viagens
      description: >-
        Fornece o status em tempo real das viagens juntamente com a trilha de
        auditoria e logs históricos detalhados.
      operationId: get_trips_logs_api_v1_trips_logs_get
      parameters:
        - name: refs
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
            description: Lista de referências de viagens
            title: Refs
          description: Lista de referências de viagens
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripLogsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/services/validate-user-token:
    get:
      tags:
        - Services
      summary: Validate User Service Token
      description: >-
        Decodes and validates a short-lived JWT auth token injected by the
        GateIn mobile app into a company service page. Returns user identity
        details (tax_id, name, phone, email) if the token is valid, not expired,
        and the user is registered.
      operationId: validate_user_token_api_v1_services_validate_user_token_get
      parameters:
        - name: Auth-Token
          in: header
          required: true
          schema:
            type: string
            title: Auth-Token
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
            description: Chave de API a ser validada
            title: X-Api-Key
          description: Chave de API a ser validada
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserIntegrationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
